# ==================== 全局设置 ====================
global:
  # 边框材质
  border-material: BLACK_STAINED_GLASS_PANE
  # 关闭按钮材质
  close-material: BARRIER
  # 返回按钮材质
  back-material: ARROW
  # 翻页按钮材质
  page-button-material: ARROW
  # 页码信息材质
  page-info-material: PAPER

# ==================== 家园列表 GUI ====================
homeland-list:
  size: 54
  # 每页显示数量
  items-per-page: 28
  # 每个列表项的槽位
  page-slots: [10, 11, 12, 13, 14, 15, 16, 19, 20, 21, 22, 23, 24, 25, 28, 29, 30, 31, 32, 33, 34, 37, 38, 39, 40, 41, 42, 43]
  # 翻页按钮
  page-prev-slot: 46
  page-next-slot: 53
  # 家园物品材质
  homeland-material: GRASS_BLOCK
  # 被邀请家园物品材质
  invited-material: OAK_DOOR
  # 空列表提示
  empty-slot: 22
  empty-material: BARRIER
  # 创建家园按钮
  create-slot: 48
  create-material: NETHER_STAR
  # 返回主世界按钮
  return-to-main-slot: 4
  return-to-main-material: BEACON
  # 关闭按钮
  close-slot: 49
  # 在线玩家按钮
  online-players-slot: 50
  online-players-material: PLAYER_HEAD

# ==================== 家园管理 GUI ====================
manage:
  size: 54
  # 家园信息
  info-slot: 13
  info-material: knowledge_book
  # 传送
  teleport-slot: 20
  teleport-material: ENDER_PEARL
  # 游戏规则
  gamerule-slot: 21
  gamerule-material: command_block
  # 返回主世界
  return-to-main-slot: 31
  return-to-main-material: BEACON
  # 地狱（三种状态共用一个槽位）
  nether-slot: 24
  nether-unlock-material: NETHERRACK
  nether-lock-material: RED_STAINED_GLASS_PANE
  nether-confirm-material: ORANGE_STAINED_GLASS_PANE
  # 末地（三种状态共用一个槽位）
  end-slot: 23
  end-unlock-material: END_STONE
  end-lock-material: RED_STAINED_GLASS_PANE
  end-confirm-material: ORANGE_STAINED_GLASS_PANE
  # 公开/私有切换
  public-slot: 32
  public-material: white_banner
  private-material: black_banner
  # 邀请管理
  invite-slot: 29
  invite-material: PLAYER_HEAD
  # 扩展边界
  expand-slot: 30
  expand-material: cherry_fence
  expand-confirm-material: LIME_STAINED_GLASS_PANE
  # 删除家园
  delete-slot: 43
  delete-material: TNT
  delete-confirm-material: RED_STAINED_GLASS_PANE
  # 访客权限按钮
  visitor-flag-slot: 22
  visitor-flag-material: OAK_SIGN
  # 重置世界按钮
  reset-slot: 33
  reset-material: SPONGE
  # 导航
  back-slot: 45
  close-slot: 53

# ==================== 创建家园地形选择 GUI ====================
